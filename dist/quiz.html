<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Quiz</title>
<link rel="stylesheet" href="../styles/main.css">
</head>
<body>

     <header class="main-header2">
    <nav>
      <div class="logo">Movie Kings</div>
        <img class="logo2" src="images/logo.svg" alt="">
      </div>
      <div class="navbar">
        <ul class="nav-menu">
          <li><a href="index.html" class="stop-quiz">Stop Quiz</a></li>
          
        </ul>
      </div>
    </nav>
    
      
  </header>

    <main class="quiz-container">
        
        <div class="progress-section">
            <div class="progress-labels">
                <span>QUESTION 1 OF 10</span>
                <span>10%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-fill"></div>
            </div>
        </div>

        <div class="quiz-card">
            <h1 class="question-text">"Here’s looking at you, kid."</h1>
            
            <div class="options-container">
                <label class="option">
                    <input type="radio" name="quiz" value="casablanca">
                    <span class="option-box">CASABLANCA</span>
                </label>
                
                <label class="option">
                    <input type="radio" name="quiz" value="gone-with-the-wind">
                    <span class="option-box">GONE WITH THE WIND</span>
                </label>

                <label class="option">
                    <input type="radio" name="quiz" value="maltese-falcon">
                    <span class="option-box">THE MALTESE FALCON</span>
                </label>

                <label class="option">
                    <input type="radio" name="quiz" value="citizen-kane">
                    <span class="option-box">CITIZEN KANE</span>
                </label>
            </div>

            <div class="actions">
                <button class="submit-btn" disabled>SUBMIT ANSWER</button>
            </div>
        </div>

    </main>
<footer>
    <div class="footer-container">
    </footer>
</body>
</html>
